name: dlms_mobile
description: DLMS — Digital Library Management System — Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ───────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ─── Networking ─────────────────────────────────────────────────────────────
  dio: ^5.7.0
  retrofit: ^4.4.1

  # ─── Dependency Injection ───────────────────────────────────────────────────
  get_it: ^8.0.2
  injectable: ^2.5.0

  # ─── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^14.6.1

  # ─── Storage ────────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # ─── Serialization ──────────────────────────────────────────────────────────
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # ─── Media ──────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # ─── Localization ───────────────────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.7
  intl: ^0.20.1

  # ─── Config ─────────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ─── Code Generation ────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  injectable_generator: ^2.7.0
  retrofit_generator: ^9.1.6

  # ─── Dev Tools ──────────────────────────────────────────────────────────────
  pretty_dio_logger: ^1.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/translations/

  # Placeholder — add font declarations here if needed
  # fonts: